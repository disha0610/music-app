<!DOCTYPE html>
<html>
<head>
    <title>My Music App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player">
        <h1>My Music App</h1>

        <audio id="song">
            <source src="songs/song.mp3" type="audio/mp3">
        </audio>

        <button onclick="playSong()">Play</button>
        <button onclick="pauseSong()">Pause</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
